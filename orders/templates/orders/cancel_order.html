{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4 text-center p-4">
            <div class="card-body">
                <div class="mb-4">
                    <i class="fas fa-times-circle text-danger opacity-75" style="font-size: 4rem;"></i>
                </div>
                <h3 class="fw-bold mb-3">Cancel Reservation</h3>
                <p class="text-muted mb-4">Are you sure you want to cancel your reservation for <strong>{{ order.product.name }}</strong> (x{{ order.quantity }})?</p>
                
                <form method="post" class="text-start">
                    {% csrf_token %}
                    <div class="mb-4">
                        {{ form|crispy }}
                    </div>
                    
                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <a href="{% url 'orders:order_history' %}" class="btn btn-outline-secondary px-4 fw-medium">Nevermind</a>
                        <button type="submit" class="btn btn-danger px-4 fw-medium">Confirm Cancellation</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
