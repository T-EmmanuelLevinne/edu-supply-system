{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-5">
                <h2 class="text-danger mb-4">Delete Order #{{ order.id }}?</h2>
                <p class="fs-5 mb-4">Are you sure you want to permanently delete this order? Stock for the product will be restored.</p>
                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete Order</button>
                    <a href="{% url 'orders:manage_orders' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
