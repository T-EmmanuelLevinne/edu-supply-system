{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm text-center p-4">
            <div class="card-body">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
                </div>
                <h3 class="fw-bold mb-3">Delete Review?</h3>
                <p class="text-muted mb-4">Are you sure you want to delete this review by <strong>{{ review.user.username }}</strong>? This action cannot be undone.</p>
                
                <div class="text-start bg-light p-3 rounded mb-4">
                    <div class="shop-card-stars mb-1">
                        <i class="{% if review.rating >= 1 %}fas{% else %}far{% endif %} fa-star"></i>
                        <i class="{% if review.rating >= 2 %}fas{% else %}far{% endif %} fa-star"></i>
                        <i class="{% if review.rating >= 3 %}fas{% else %}far{% endif %} fa-star"></i>
                        <i class="{% if review.rating >= 4 %}fas{% else %}far{% endif %} fa-star"></i>
                        <i class="{% if review.rating >= 5 %}fas{% else %}far{% endif %} fa-star"></i>
                    </div>
                    <p class="mb-0 text-muted fst-italic">"{{ review.comment|default:'No comment provided' }}"</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'products:product_detail' review.product.id %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Delete Review</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
