{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-danger mb-4">Confirm Deletion</h3>
                <p class="fs-5">Are you sure you want to delete the product <strong>"{{ product.name }}"</strong>?</p>
                <form method="post" class="mt-4 d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'products:product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
