{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">My Profile</h2>
            <a href="{% url 'customers:delete_profile' %}" class="btn btn-outline-danger btn-sm">Delete Account</a>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="mb-3" style="color: var(--color-text-main);">Account Information</h5>
                            {{ user_form|crispy }}
                            <small class="text-muted d-block mb-3">Leave password fields blank if you don't want to change it.</small>
                        </div>
                        <div class="col-md-6">
                            <h5 class="mb-3" style="color: var(--color-text-main);">Shipping Information</h5>
                            {{ customer_form|crispy }}
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-solid-shop">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
