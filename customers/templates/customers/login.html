{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="color: var(--color-text-main);">Welcome Back</h2>
                    <p class="text-muted">Sign in to your EduSupply account</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-solid-shop">Login</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account? <a href="{% url 'customers:register' %}" class="text-decoration-none fw-bold">Sign up</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
