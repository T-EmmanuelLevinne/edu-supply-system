{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-5">
                <h2 class="text-danger mb-4">Delete Account?</h2>
                <p class="fs-5 mb-4">Are you absolutely sure you want to delete your account? This action cannot be undone and you will lose your order history.</p>
                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete My Account</button>
                    <a href="{% url 'customers:profile' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
