{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm text-center p-4">
            <div class="card-body">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                </div>
                <h3 class="fw-bold mb-3">Delete User Account?</h3>
                <p class="text-muted mb-4">Are you sure you want to permanently delete the account of <strong>{{ target_user.username }}</strong>? This action cannot be undone and will wipe their order history.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'customers:customer_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Delete User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
